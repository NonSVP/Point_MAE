optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.001, 
  weight_decay : 0.05
}}

scheduler: {
  type: Cosine,
  kwargs: {
    epochs: 300,
    initial_epochs : 10
}}

dataset : {
  train : { 
    _base_: cfgs/dataset_configs/MyCustomData.yaml, 
    others: {subset: 'train', npoints: 300, bs: 128}
  },
  val : { 
    _base_: cfgs/dataset_configs/MyCustomData.yaml, 
    others: {subset: 'val', npoints: 300, bs: 1} # Looks for 'val' logic in loader
  },
  test : { 
    _base_: cfgs/dataset_configs/MyCustomData.yaml, 
    others: {subset: 'test', npoints: 300, bs: 1} # Looks for 'test' logic in loader
  } 
}

model: {
  NAME: Point_MAE, 
  group_size: 10,     
  num_group: 32,      
  loss: cdl1,
  transformer_config: {
    mask_ratio: 0.6,
    mask_type: 'rand',
    trans_dim: 384,
    encoder_dims: 384,
    depth: 12,
    drop_path_rate: 0.1,
    num_heads: 6,
    decoder_depth: 4,
    decoder_num_heads: 6,
  },
}

total_bs : 128
step_per_update : 1
max_epoch : 300